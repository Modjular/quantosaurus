<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Ilastik</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎨</text></svg>">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #1e1e1e; color: #eee; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #top-bar { padding: 10px 20px; background: #2d2d2d; border-bottom: 1px solid #3d3d3d; display: flex; align-items: center; gap: 20px; z-index: 10; }
        #main-container { flex: 1; display: flex; overflow: hidden; }
        #sidebar { width: 260px; background: #252526; border-right: 1px solid #3d3d3d; padding: 20px; display: flex; flex-direction: column; gap: 20px; overflow-y: auto; flex-shrink: 0; z-index: 10; }

        /* Viewport hides overflow and acts as the window for our camera */
        #viewport {
            flex: 1; position: relative; background: #000;
            overflow: hidden;
            transition: background 0.2s;
        }
        #viewport.drag-active { background: #1a3a4a; }

        /* The board moves and scales based on our JS camera state */
        #canvas-board {
            display: flex; gap: 20px; padding: 20px;
            transform-origin: 0 0;
            width: max-content;
        }

        .image-container {
            position: relative;
            flex-shrink: 0;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            background: #111;
        }

        .control-group { display: flex; flex-direction: column; gap: 8px; }
        .control-group label { font-size: 12px; color: #aaa; text-transform: uppercase; letter-spacing: 0.5px; }
        input[type="range"] { width: 100%; }

        .class-selector { display: flex; flex-direction: column; gap: 4px; }
        .class-item { display: flex; align-items: center; gap: 10px; padding: 8px; background: #333; border-radius: 4px; cursor: pointer; border: 2px solid transparent; }
        .class-item.active { border-color: #007acc; background: #3d3d3d; }
        .color-box { width: 16px; height: 16px; border-radius: 2px; }

        button { background: #007acc; color: white; border: none; padding: 10px; border-radius: 4px; cursor: pointer; font-weight: 600; }
        button:hover { background: #0062cc; }
        button:disabled { background: #444; cursor: not-allowed; }

        canvas { position: absolute; top: 0; left: 0; max-width: 100%; max-height: 100%; image-rendering: pixelated; }
        .gpu-canvas { z-index: 1; }
        .label-canvas { z-index: 2; cursor: crosshair; }

        #status { font-size: 12px; color: #888; }

        /* Spacebar panning cursors */
        body.space-down .label-canvas { cursor: grab !important; }
        body.space-down.panning .label-canvas { cursor: grabbing !important; }
    </style>
</head>
<body>

<div id="top-bar">
    <h2 style="margin:0; font-size: 18px; color: #007acc;">ilastik <span style="color:#eee; font-weight: 300;">webgpu</span></h2>
    <input type="file" id="fileInput" accept=".tif,.tiff,.png,.jpg" multiple style="font-size: 12px;">
    <div id="status">No images loaded. Drag and drop here.</div>
</div>

<div id="main-container">
    <div id="sidebar">
        <div class="control-group">
            <label>Feature Scale (Sigma)</label>
            <div style="display:flex; gap:10px;">
                <input type="range" id="sigmaRange" min="0.3" max="10.0" step="0.1" value="1.0">
                <span id="sigmaVal" style="min-width:30px;">1.0</span>
            </div>
        </div>

        <div class="control-group">
            <label>Brush Size &amp; Eraser</label>
            <div style="display: flex; gap: 10px; align-items: center;">
                <input type="number" id="brushSize" value="5" min="1" max="50" step=1 style="width: 60px;">
                <button id="btnEraser" style="flex: 1; background: #444; padding: 8px;">Eraser: OFF</button>
            </div>
        </div>

        <div class="control-group">
            <label>Classes</label>
            <div class="class-selector">
                <div class="class-item active" data-class="0">
                    <div class="color-box" style="background: red;"></div>
                    <span>Class 1</span>
                </div>
                <div class="class-item" data-class="1">
                    <div class="color-box" style="background: green;"></div>
                    <span>Class 2</span>
                </div>
                <div class="class-item" data-class="2">
                    <div class="color-box" style="background: blue;"></div>
                    <span>Class 3</span>
                </div>
            </div>
        </div>

        <button id="btnTrain" disabled>Live Update Off</button>

        <div class="control-group" style="margin-top: 10px; border-top: 1px solid #3d3d3d; padding-top: 15px; display: flex; flex-direction: column; gap: 10px;">
            <label>Export Images</label>
            <div style="display: flex; flex-direction: column; gap: 6px; font-size: 12px;">
                <label style="display: flex; align-items: center; gap: 6px; text-transform: none; color: #eee; font-weight: normal; letter-spacing: 0; cursor: pointer;">
                    <input type="checkbox" id="chkExportSeg" checked> Segmentations
                </label>
                <label style="display: flex; align-items: center; gap: 6px; text-transform: none; color: #eee; font-weight: normal; letter-spacing: 0; cursor: pointer;">
                    <input type="checkbox" id="chkExportProb"> Probabilities
                </label>
            </div>

            <div style="font-size: 11px; color: #aaa; display: flex; flex-direction: column; gap: 6px;">
                <div id="dirStatus" style="word-break: break-all; color: #888;">Destination: ZIP download (default)</div>
                <button id="btnSetDir" style="background: #3a3a3a; font-size: 11px; padding: 6px; width: 100%;">Set Output Folder</button>
            </div>

            <button id="btnExportAll" disabled style="background: #28a745; margin-top: 4px; padding: 8px; font-size: 12px;">Export Loaded Images</button>
        </div>

        <div style="font-size:11px; color:#666; line-height:1.4;">
            1. Drag &amp; drop images.<br>
            2. Paint labels (Red/Green/Blue).<br>
            3. Trackpad to pan/zoom (or hold Spacebar).<br>
            4. Run on WebGPU.
        </div>
    </div>

    <div id="viewport">
        <div id="canvas-board"></div>
    </div>
</div>

<script type="module">
    import { FlatRandomForest } from './rf.js';
    import { WebGpuBackend } from "./backends/webgpu.js";
    import { loadFileIntoArray, verifyPermission, writeFile, buildTrainingDataset, eraseLabelsInRadius, exportImagesData } from "./utils.js";

    // --- Constants ---
    // FIX: Magic numbers extracted to named constants.
    const RF_CONFIG = { numTrees: 8, maxDepth: 8 };
    const MIN_LABELS_TO_TRAIN = 5;
    const CAMERA_ZOOM_MIN = 0.1;
    const CAMERA_ZOOM_MAX = 10;
    const CAMERA_ZOOM_SENSITIVITY = 0.01;
    const TRAIN_DEBOUNCE_MS = 300;

    // --- State ---
    // FIX: outputDirHandle moved into state for consistency.
    // FIX: camera sub-object kept but drawing, ML, and UI flags are now
    //      clearly grouped by comment, making ownership more obvious.
    const state = {
        // Image data
        images: [],

        // ML
        rf: new FlatRandomForest(RF_CONFIG),

        // Drawing
        currentClass: 0,
        isDrawing: false,
        activeImageId: null,
        isEraser: false,

        // Features
        sigma: 1.0,

        // Live update
        liveUpdate: false,

        // Camera
        camera: { x: 0, y: 0, scale: 1 },
        isSpaceDown: false,
        isPanning: false,

        // Export
        outputDirHandle: null,
    };

    // --- Debounced train ---
    // FIX: trainAndPredictAll is now debounced so rapid sigma slider changes
    //      or quick mouse events don't stack up redundant retrains.
    let _trainTimer = null;
    function scheduleTrainAndPredictAll() {
        clearTimeout(_trainTimer);
        _trainTimer = setTimeout(() => trainAndPredictAll(), TRAIN_DEBOUNCE_MS);
    }

    function init() {
        setupCamera();
        setupUI();
    }

    // --- Camera ---
    // FIX: setupCamera is self-contained — it no longer relies on anything
    //      from setupUI, and exposes updateBoard via a closure-local function.
    function setupCamera() {
        const viewport = document.getElementById('viewport');
        const board = document.getElementById('canvas-board');

        function updateBoard() {
            board.style.transform = `translate(${state.camera.x}px, ${state.camera.y}px) scale(${state.camera.scale})`;
        }

        // Trackpad / Wheel Navigation
        viewport.addEventListener('wheel', (e) => {
            e.preventDefault(); // Stop browser back-swipe or standard scroll

            if (e.ctrlKey || e.metaKey) {
                // Pinch-to-zoom
                const delta = -e.deltaY * CAMERA_ZOOM_SENSITIVITY;
                const newScale = Math.min(Math.max(CAMERA_ZOOM_MIN, state.camera.scale * Math.exp(delta)), CAMERA_ZOOM_MAX);

                const rect = viewport.getBoundingClientRect();
                const mouseX = e.clientX - rect.left;
                const mouseY = e.clientY - rect.top;
                const boardX = (mouseX - state.camera.x) / state.camera.scale;
                const boardY = (mouseY - state.camera.y) / state.camera.scale;

                state.camera.scale = newScale;
                state.camera.x = mouseX - boardX * state.camera.scale;
                state.camera.y = mouseY - boardY * state.camera.scale;
            } else {
                // Two-finger pan
                state.camera.x -= e.deltaX;
                state.camera.y -= e.deltaY;
            }
            updateBoard();
        }, { passive: false });

        // Spacebar panning
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && !state.isSpaceDown) {
                state.isSpaceDown = true;
                document.body.classList.add('space-down');
            }
        });

        window.addEventListener('keyup', (e) => {
            if (e.code === 'Space') {
                state.isSpaceDown = false;
                state.isPanning = false;
                document.body.classList.remove('space-down', 'panning');
            }
        });

        viewport.addEventListener('mousedown', () => {
            if (state.isSpaceDown) {
                state.isPanning = true;
                document.body.classList.add('panning');
            }
        });

        window.addEventListener('mousemove', (e) => {
            if (state.isPanning) {
                state.camera.x += e.movementX;
                state.camera.y += e.movementY;
                updateBoard();
            }
        });

        // FIX: Global mouseup now only resets camera/pan state. Drawing cleanup
        //      is handled inside each labelCanvas's own mouseup listener (see
        //      addImage), so trainAndPredictAll is only scheduled when drawing
        //      actually occurred — not on every click anywhere in the window.
        window.addEventListener('mouseup', () => {
            state.isPanning = false;
            document.body.classList.remove('panning');
        });
    }

    // --- UI Setup ---
    function setupUI() {
        const btnTrain = document.getElementById('btnTrain');
        btnTrain.onclick = () => {
            state.liveUpdate = !state.liveUpdate;
            btnTrain.innerText = state.liveUpdate ? "Live Update On" : "Live Update Off";
            btnTrain.style.background = state.liveUpdate ? "#4CAF50" : "#007acc";
            if (state.liveUpdate) trainAndPredictAll();
        };

        // FIX: sigma changes are debounced to avoid stacking sequential retrains.
        document.getElementById('sigmaRange').oninput = async (e) => {
            state.sigma = parseFloat(e.target.value);
            document.getElementById('sigmaVal').innerText = state.sigma.toFixed(1);
            for (const img of state.images) {
                await img.backend.updateFeatures(img.intensityArray, state.sigma);
            }
            if (state.liveUpdate) scheduleTrainAndPredictAll();
        };

        const btnEraser = document.getElementById('btnEraser');
        btnEraser.onclick = () => {
            state.isEraser = !state.isEraser;
            btnEraser.innerText = state.isEraser ? "Eraser: ON" : "Eraser: OFF";
            btnEraser.style.background = state.isEraser ? "#e51400" : "#444";
        };

        document.querySelectorAll('.class-item').forEach(el => {
            el.onclick = () => {
                document.querySelectorAll('.class-item').forEach(i => i.classList.remove('active'));
                el.classList.add('active');
                state.currentClass = parseInt(el.dataset.class);
            };
        });

        // FIX: handleFiles errors are now surfaced via .catch instead of being silently dropped.
        document.getElementById('fileInput').onchange = (e) =>
            handleFiles(e.target.files).catch(console.error);

        const viewport = document.getElementById('viewport');
        viewport.ondragover = (e) => { e.preventDefault(); viewport.classList.add('drag-active'); };
        viewport.ondragleave = (e) => { e.preventDefault(); viewport.classList.remove('drag-active'); };
        viewport.ondrop = (e) => {
            e.preventDefault();
            viewport.classList.remove('drag-active');
            handleFiles(e.dataTransfer.files).catch(console.error);
        };

        // Directory Selection
        const btnSetDir = document.getElementById('btnSetDir');
        const dirStatus = document.getElementById('dirStatus');

        if (!('showDirectoryPicker' in window)) {
            btnSetDir.style.display = 'none';
            dirStatus.innerText = "Destination: ZIP download (Folder API not supported)";
        } else {
            btnSetDir.onclick = async () => {
                try {
                    // FIX: outputDirHandle stored on state, not as a loose module-level var.
                    state.outputDirHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
                    dirStatus.innerText = `Destination: /${state.outputDirHandle.name}/`;
                    dirStatus.style.color = '#4CAF50';
                } catch (err) {
                    console.warn(err);
                }
            };
        }

        // Export
        const btnExport = document.getElementById('btnExportAll');
        btnExport.onclick = async () => {
            const exportSeg = document.getElementById('chkExportSeg').checked;
            const exportProb = document.getElementById('chkExportProb').checked;

            if (!exportSeg && !exportProb) {
                alert("Please select at least one export option (Segmentations or Probabilities).");
                return;
            }

            const totalLabels = state.images.reduce((sum, img) => sum + img.labels.length, 0);
            if (totalLabels < MIN_LABELS_TO_TRAIN) {
                alert(`Please paint at least ${MIN_LABELS_TO_TRAIN} labels across your images to train the model before exporting.`);
                return;
            }

            const originalText = btnExport.innerText;
            const originalBackground = btnExport.style.background;
            btnExport.disabled = true;
            btnExport.style.background = '#888';

            try {
                btnExport.innerText = "Training model...";
                await trainAndPredictAll();

                btnExport.innerText = "Exporting...";
                await exportImagesData(state.images, state.rf, {
                    exportSeg,
                    exportProb,
                    outputDirHandle: state.outputDirHandle,
                    verifyPermission,
                    writeFile,
                });

                alert("All images exported successfully!");
            } catch (err) {
                console.error(err);
                alert(`Export failed: ${err.message}`);
            } finally {
                btnExport.disabled = false;
                btnExport.style.background = originalBackground;
                btnExport.innerText = originalText;
                updateExportButtonCount();
            }
        };
    }

    async function handleFiles(files) {
        for (let i = 0; i < files.length; i++) {
            const file = files[i];
            if (!file.name.match(/\.(tif|tiff|png|jpg|jpeg)$/i)) continue;
            await addImage(file);
        }
    }

    async function addImage(file) {
        const { intensityArray, rgba, w, h } = await loadFileIntoArray(file);

        // FIX: Use crypto.randomUUID() instead of the float-addition ID hack.
        const imgId = crypto.randomUUID();

        const container = document.createElement('div');
        container.className = 'image-container';
        container.style.width = w + 'px';
        container.style.height = h + 'px';

        const gpuCanvas = document.createElement('canvas');
        gpuCanvas.className = 'gpu-canvas';
        gpuCanvas.width = w; gpuCanvas.height = h;

        const labelCanvas = document.createElement('canvas');
        labelCanvas.className = 'label-canvas';
        labelCanvas.width = w; labelCanvas.height = h;

        container.appendChild(gpuCanvas);
        container.appendChild(labelCanvas);
        document.getElementById('canvas-board').appendChild(container);

        const backend = new WebGpuBackend();
        try {
            await backend.initialize(gpuCanvas);
        } catch (error) {
            console.error(error);
            alert("WebGPU not supported or initialization failed.");
            container.remove();
            return;
        }

        await backend.allocateImage(w, h, rgba);
        await backend.updateFeatures(intensityArray, state.sigma);

        const imgState = {
            id: imgId, name: file.name, backend, width: w, height: h,
            intensityArray, labels: [], gpuCanvas, labelCanvas, container,
            // FIX: Cache the bounding rect at mousedown, not on every mousemove.
            //      Invalidated on resize via ResizeObserver below.
            _cachedRect: null,
        };
        state.images.push(imgState);

        // FIX: Cache getBoundingClientRect at mousedown so mousemove doesn't
        //      force a layout reflow on every event.
        labelCanvas.addEventListener('mousedown', (e) => {
            if (state.isSpaceDown) return;
            imgState._cachedRect = labelCanvas.getBoundingClientRect();
            state.isDrawing = true;
            state.activeImageId = imgId;
            paint(e, imgState);
        });

        labelCanvas.addEventListener('mousemove', (e) => {
            if (state.isDrawing && state.activeImageId === imgId && !state.isSpaceDown) {
                paint(e, imgState);
            }
        });

        // FIX: Drawing cleanup and conditional training are scoped to the canvas
        //      mouseup, not the global window mouseup. This prevents triggering
        //      trainAndPredictAll on every click anywhere in the window.
        labelCanvas.addEventListener('mouseup', () => {
            if (state.activeImageId === imgId) {
                state.isDrawing = false;
                state.activeImageId = null;
                if (state.liveUpdate) scheduleTrainAndPredictAll();
            }
        });

        // FIX: Invalidate the cached rect when the canvas is resized/zoomed
        //      (e.g. trackpad zoom changes the CSS bounding rect).
        const ro = new ResizeObserver(() => { imgState._cachedRect = null; });
        ro.observe(labelCanvas);

        document.getElementById('status').innerText = `Loaded ${state.images.length} image(s)`;
        document.getElementById('btnTrain').disabled = false;
        updateExportButtonCount();
    }

    function paint(e, imgState) {
        // FIX: Use the rect cached at mousedown rather than calling
        //      getBoundingClientRect() on every mousemove (which forces reflow).
        const rect = imgState._cachedRect || imgState.labelCanvas.getBoundingClientRect();
        const scaleX = imgState.width / rect.width;
        const scaleY = imgState.height / rect.height;
        const x = Math.floor((e.clientX - rect.left) * scaleX);
        const y = Math.floor((e.clientY - rect.top) * scaleY);
        const radius = parseInt(document.getElementById('brushSize').value);

        const ctx = imgState.labelCanvas.getContext('2d');

        if (state.isEraser) {
            ctx.globalCompositeOperation = 'destination-out';
            ctx.beginPath();
            ctx.arc(x, y, radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalCompositeOperation = 'source-over';

            imgState.labels = eraseLabelsInRadius(imgState.labels, x, y, radius);
        } else {
            // FIX: Deduplicate labels — don't push a new point if the last label
            //      is at the same pixel, preventing label array bloat from slow drags.
            const last = imgState.labels[imgState.labels.length - 1];
            const isDuplicate = last && last.x === x && last.y === y && last.cls === state.currentClass;

            if (!isDuplicate && x >= 0 && x < imgState.width && y >= 0 && y < imgState.height) {
                // Class 0 = red, 1 = green, 2 = blue
                const COLORS = ['rgba(255,0,0,0.5)', 'rgba(0,255,0,0.5)', 'rgba(0,0,255,0.5)'];
                ctx.fillStyle = COLORS[state.currentClass] ?? COLORS[0];
                ctx.beginPath();
                ctx.arc(x, y, radius, 0, Math.PI * 2);
                ctx.fill();

                imgState.labels.push({ x, y, cls: state.currentClass });
            }
        }
    }

    async function trainAndPredictAll() {
        const totalLabels = state.images.reduce((sum, img) => sum + img.labels.length, 0);
        if (totalLabels < MIN_LABELS_TO_TRAIN) return;

        const { combinedX, yArray } = await buildTrainingDataset(state.images, totalLabels);
        state.rf.train(combinedX, yArray, RF_CONFIG.numTrees);

        for (const img of state.images) {
            await img.backend.runInference(state.rf);
        }
    }

    function updateExportButtonCount() {
        const btn = document.getElementById('btnExportAll');
        if (state.images.length > 0) {
            btn.innerText = `Export Loaded Images (${state.images.length})`;
            btn.disabled = false;
        } else {
            btn.innerText = `Export Loaded Images`;
            btn.disabled = true;
        }
    }

    init();
</script>
</body>
</html>
